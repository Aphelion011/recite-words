<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📖 背单词助手 - 多分组</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10);
            text-align: center;
            max-width: 560px;
            width: 100%;
        }
        h1 {
            font-size: 26px;
            color: #2d3748;
        }
        .subtitle {
            color: #718096;
            font-size: 13px;
            margin-bottom: 20px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 12px;
        }

        /* ========== 分组切换按钮 ========== */
        .set-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .set-btn {
            padding: 6px 18px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #4a5568;
        }
        .set-btn:hover {
            background: #edf2f7;
        }
        .set-btn.active {
            background: #2b6cb0;
            border-color: #2b6cb0;
            color: white;
        }

        /* ========== 单词卡片 ========== */
        .word-card {
            background: #f7fafc;
            border-radius: 28px;
            padding: 35px 20px;
            margin-bottom: 25px;
            border: 2px dashed #e2e8f0;
            min-height: 170px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #word-en {
            font-size: 40px;
            font-weight: 700;
            color: #1a202c;
        }
        #word-zh {
            font-size: 20px;
            color: #4a5568;
            margin-top: 8px;
        }
        #progress-text {
            font-size: 13px;
            color: #a0aec0;
            margin-top: 10px;
        }

        /* ========== 按钮 ========== */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .btn {
            border: none;
            padding: 12px 28px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }
        .btn-know {
            background: #48bb78;
            color: white;
        }
        .btn-know:hover {
            background: #38a169;
            transform: scale(1.02);
        }
        .btn-dont {
            background: #fc8181;
            color: white;
        }
        .btn-dont:hover {
            background: #f56565;
            transform: scale(1.02);
        }
        .btn-reset {
            background: #edf2f7;
            color: #4a5568;
            font-size: 14px;
            padding: 12px 20px;
            flex: 0.4;
        }
        .btn-reset:hover {
            background: #e2e8f0;
        }

        /* ========== 统计 ========== */
        .stats {
            background: #f7fafc;
            border-radius: 20px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-around;
            font-size: 15px;
            color: #2d3748;
            border: 1px solid #edf2f7;
        }
        .stats span {
            font-weight: 700;
            color: #2b6cb0;
        }
        .stats .highlight-green {
            color: #38a169;
        }
        .stats .highlight-red {
            color: #e53e3e;
        }

        .finish-box {
            display: none;
            padding: 20px 0;
        }
        .finish-box h2 {
            color: #38a169;
        }
        .set-label {
            display: inline-block;
            background: #e2e8f0;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #4a5568;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📖 背单词助手</h1>
        <p class="subtitle">小组协作 · 多分组版</p>

        <!-- 分组选择 -->
        <div class="set-selector" id="setSelector">
            <button class="set-btn active" data-set="0">📘 四级词汇</button>
            <button class="set-btn" data-set="1">📗 六级词汇</button>
            <button class="set-btn" data-set="2">📕 考研词汇</button>
        </div>

        <div class="word-card" id="wordCard">
            <div id="word-en">Hello</div>
            <div id="word-zh">你好</div>
            <div id="progress-text">第 1 / 20 个</div>
        </div>

        <div class="btn-group">
            <button class="btn btn-know" onclick="handleKnow()">✅ 认识</button>
            <button class="btn btn-dont" onclick="handleDontKnow()">❌ 不认识</button>
            <button class="btn btn-reset" onclick="resetGame()">↺ 重来</button>
        </div>

        <div class="stats">
            <div>📚 已学 <span id="totalCount">0</span></div>
            <div>✅ 正确 <span id="correctCount" class="highlight-green">0</span></div>
            <div>🎯 正确率 <span id="rateCount">0%</span></div>
        </div>

        <div class="finish-box" id="finishBox">
            <h2>🎉 全部背完啦！</h2>
            <p style="color:#718096;">太棒了，点击「重来」再复习一遍吧</p>
        </div>
    </div>

    <script>
        // ================================================================
        // 第一部分：多组单词数据（组员可以继续扩充分组）
        // ================================================================
        const WORD_SETS = [{
            name: "四级词汇",
            words: [
                { en: "abandon", zh: "放弃" },
                { en: "brilliant", zh: "杰出的" },
                { en: "capture", zh: "捕获" },
                { en: "diverse", zh: "多样的" },
                { en: "eager", zh: "渴望的" },
                { en: "fragile", zh: "脆弱的" },
                { en: "generous", zh: "慷慨的" },
                { en: "humble", zh: "谦虚的" },
                { en: "ignite", zh: "点燃" },
                { en: "jungle", zh: "丛林" },
                { en: "keen", zh: "敏锐的" },
                { en: "leap", zh: "跳跃" },
                { en: "mature", zh: "成熟的" },
                { en: "noble", zh: "高贵的" },
                { en: "obstacle", zh: "障碍" },
                { en: "precious", zh: "珍贵的" },
                { en: "radiant", zh: "光芒四射的" },
                { en: "sincere", zh: "真诚的" },
                { en: "thrive", zh: "繁荣" },
                { en: "vivid", zh: "生动的" }
            ]
        }, {
            name: "六级词汇",
            words: [
                { en: "ambiguous", zh: "模棱两可的" },
                { en: "bureaucracy", zh: "官僚主义" },
                { en: "chronic", zh: "慢性的" },
                { en: "dedicate", zh: "致力于" },
                { en: "elite", zh: "精英" },
                { en: "feasible", zh: "可行的" },
                { en: "glamour", zh: "魅力" },
                { en: "handicap", zh: "障碍" },
                { en: "illuminate", zh: "照亮" },
                { en: "jeopardize", zh: "危害" },
                { en: "latitude", zh: "纬度" },
                { en: "momentum", zh: "势头" },
                { en: "notorious", zh: "臭名昭著的" },
                { en: "overwhelm", zh: "压倒" },
                { en: "persistent", zh: "坚持不懈的" },
                { en: "redundant", zh: "多余的" },
                { en: "simulate", zh: "模拟" },
                { en: "transient", zh: "短暂的" },
                { en: "unanimous", zh: "一致的" },
                { en: "vulnerable", zh: "脆弱的" }
            ]
        }, {
            name: "考研词汇",
            words: [
                { en: "contemplate", zh: "沉思" },
                { en: "deteriorate", zh: "恶化" },
                { en: "elaborate", zh: "精心制作" },
                { en: "fluctuate", zh: "波动" },
                { en: "grievance", zh: "不满" },
                { en: "hierarchy", zh: "等级制度" },
                { en: "indignant", zh: "愤怒的" },
                { en: "juvenile", zh: "青少年" },
                { en: "legitimate", zh: "合法的" },
                { en: "manuscript", zh: "手稿" },
                { en: "negligible", zh: "微不足道的" },
                { en: "obsolete", zh: "过时的" },
                { en: "paradigm", zh: "范例" },
                { en: "quantify", zh: "量化" },
                { en: "refugee", zh: "难民" },
                { en: "scrutiny", zh: "详细检查" },
                { en: "subsidy", zh: "补贴" },
                { en: "threshold", zh: "门槛" },
                { en: "underlying", zh: "潜在的" },
                { en: "versatile", zh: "多才多艺的" }
            ]
        }];

        // ================================================================
        // 第二部分：状态
        // ================================================================
        let currentSetIndex = 0;        // 当前第几组
        let currentIndex = 0;
        let totalCount = 0;
        let correctCount = 0;
        let isFinished = false;

        // DOM
        const wordEnEl = document.getElementById('word-en');
        const wordZhEl = document.getElementById('word-zh');
        const progressText = document.getElementById('progress-text');
        const totalCountEl = document.getElementById('totalCount');
        const correctCountEl = document.getElementById('correctCount');
        const rateCountEl = document.getElementById('rateCount');
        const finishBox = document.getElementById('finishBox');
        const wordCard = document.getElementById('wordCard');
        const setBtns = document.querySelectorAll('.set-btn');

        // 获取当前组的单词列表
        function getCurrentWords() {
            return WORD_SETS[currentSetIndex].words;
        }

        // 获取当前组名称
        function getCurrentSetName() {
            return WORD_SETS[currentSetIndex].name;
        }

        // ================================================================
        // 第三部分：核心函数
        // ================================================================
        function renderWord() {
            const words = getCurrentWords();
            if (isFinished || currentIndex >= words.length) {
                wordCard.style.display = 'none';
                finishBox.style.display = 'block';
                return;
            }
            wordCard.style.display = 'flex';
            finishBox.style.display = 'none';

            const word = words[currentIndex];
            wordEnEl.textContent = word.en;
            wordZhEl.textContent = word.zh;
            progressText.textContent = `第 ${currentIndex + 1} / ${words.length} 个 [${getCurrentSetName()}]`;
        }

        function updateStats() {
            totalCountEl.textContent = totalCount;
            correctCountEl.textContent = correctCount;
            const rate = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);
            rateCountEl.textContent = rate + '%';
        }

        function handleKnow() {
            const words = getCurrentWords();
            if (isFinished || currentIndex >= words.length) return;
            totalCount++;
            correctCount++;
            currentIndex++;
            updateStats();
            checkFinish();
            renderWord();
        }

        function handleDontKnow() {
            const words = getCurrentWords();
            if (isFinished || currentIndex >= words.length) return;
            totalCount++;
            currentIndex++;
            updateStats();
            checkFinish();
            renderWord();
        }

        function checkFinish() {
            const words = getCurrentWords();
            if (currentIndex >= words.length) {
                isFinished = true;
                renderWord();
            }
        }

        function resetGame() {
            currentIndex = 0;
            totalCount = 0;
            correctCount = 0;
            isFinished = false;
            finishBox.style.display = 'none';
            wordCard.style.display = 'flex';
            updateStats();
            renderWord();
        }

        // ================================================================
        // 第四部分：切换分组
        // ================================================================
        function switchSet(index) {
            if (index === currentSetIndex) {
                // 如果点的是同一组，只重置进度
                resetGame();
                return;
            }
            currentSetIndex = index;
            // 更新按钮高亮
            setBtns.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            // 重置所有状态
            currentIndex = 0;
            totalCount = 0;
            correctCount = 0;
            isFinished = false;
            finishBox.style.display = 'none';
            wordCard.style.display = 'flex';
            updateStats();
            renderWord();
        }

        // 绑定切换按钮事件
        setBtns.forEach((btn) => {
            btn.addEventListener('click', function() {
                const setIndex = parseInt(this.dataset.set);
                switchSet(setIndex);
            });
        });

        // ================================================================
        // 第五部分：初始化
        // ================================================================
        renderWord();
        updateStats();
        console.log('📖 背单词助手（多分组版）已启动！');
        console.log('👥 目前有 ' + WORD_SETS.length + ' 组单词，共 ' + WORD_SETS.reduce((acc, cur) => acc + cur.words.length, 0) + ' 个词');
    </script>
</body>
</html>
